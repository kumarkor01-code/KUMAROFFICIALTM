<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Music Dashboard</title>
    <style>
        :root { --accent: #ff007f; --bg: #0f0f0f; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Playlist Sidebar */
        #sidebar { width: 300px; background: #1a1a1a; padding: 20px; border-right: 1px solid #333; }
        .song-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .song-item:hover { background: #333; }

        /* Main Player Area */
        #main { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #333 0%, #000 100%); }
        .visualizer { display: flex; gap: 5px; height: 100px; align-items: flex-end; margin-bottom: 40px; }
        .bar { width: 10px; background: var(--accent); animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { height: 20px; } to { height: 80px; } }
        
        .controls { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 50px; display: flex; gap: 20px; }
        button { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>My Playlist</h2>
        <div class="song-item" onclick="loadSong('Midnight Vibes', 'Electronic Chill')">1. Midnight Vibes</div>
        <div class="song-item" onclick="loadSong('Relaxing Rain', 'Nature Sound')">2. Relaxing Rain</div>
        <div class="song-item" onclick="loadSong('Morning Energy', 'Pop Mix')">3. Morning Energy</div>
    </div>

    <div id="main">
        <div class="visualizer">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div>
        </div>
        
        <h1 id="title">Select a Song</h1>
        <p id="artist">Artist Name</p>
        
        <div class="controls">
            <button onclick="prev()">⏮️</button>
            <button id="playBtn" onclick="togglePlay()">▶️ PLAY</button>
            <button onclick="next()">⏭️</button>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        let isPlaying = false;
        function loadSong(title, artist) {
            document.getElementById('title').innerText = title;
            document.getElementById('artist').innerText = artist;
            alert("Loading: " + title);
        }
        function togglePlay() {
            isPlaying = !isPlaying;
            document.getElementById('playBtn').innerText = isPlaying ? "⏸️ PAUSE" : "▶️ PLAY";
        }
    </script>
</body>
</html>
