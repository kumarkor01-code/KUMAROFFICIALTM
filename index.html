<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supermarket Tycoon PRO</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .header { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #444; }
        .money-bar { font-size: 24px; color: #00ff00; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .shelf { background: #222; padding: 20px; border-radius: 15px; border: 2px solid #333; cursor: pointer; transition: 0.3s; }
        .shelf:hover { border-color: #00ff00; transform: scale(1.05); }
        .btn { background: #007bff; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>SUPERMARKET TYCOON</h1>
    <div class="money-bar">Balance: $<span id="balance">100</span></div>
</div>

<div class="grid" id="shop-grid">
    <!-- Shelves will appear here -->
</div>

<button class="btn" style="background:#28a745; max-width: 300px;" onclick="addShelf()">BUILD NEW SHELF ($50)</button>

<script>
    let money = 100;
    let shelves = [];

    function addShelf() {
        if (money >= 50) {
            money -= 50;
            shelves.push({ stock: 5 });
            updateBalance();
            renderShop();
        } else {
            alert("Not enough money!");
        }
    }

    function sellItem(index) {
        if (shelves[index].stock > 0) {
            shelves[index].stock--;
            money += 10; // 10 dollars per sale
            updateBalance();
            renderShop();
            playSuccessSound();
        } else {
            alert("Shelf empty! Click Restock.");
        }
    }

    function restock(index) {
        if (money >= 5) {
            money -= 5;
            shelves[index].stock = 5;
            updateBalance();
            renderShop();
        } else {
            alert("Not enough money to restock!");
        }
    }

    function updateBalance() {
        document.getElementById('balance').innerText = money;
    }

    function renderShop() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = '';
        shelves.forEach((s, i) => {
            grid.innerHTML += `
                <div class="shelf" onclick="sellItem(${i})">
                    <h3>Shelf ${i+1}</h3>
                    <p>Stock: ${s.stock} / 5</p>
                    <button class="btn" onclick="event.stopPropagation(); restock(${i})">Restock ($5)</button>
                </div>
            `;
        });
    }

    function playSuccessSound() {
        let audio = new AudioContext();
        let osc = audio.createOscillator();
        osc.connect(audio.destination);
        osc.frequency.value = 440;
        osc.start();
        osc.stop(audio.currentTime + 0.1);
    }

    // Auto-Customer Logic
    setInterval(() => {
        shelves.forEach((s, i) => {
            if (s.stock > 0 && Math.random() > 0.7) {
                sellItem(i);
            }
        });
    }, 2000);

    renderShop();
</script>
</body>
</html>
