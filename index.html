<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermarket Tycoon</title>
    <style>
        body { 
            background: #121212; 
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
        }
        .game-box { 
            background: #222; 
            padding: 20px; 
            border-radius: 15px; 
            max-width: 400px; 
            margin: auto; 
            border: 2px solid #444; 
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.2);
        }
        .shelf { 
            background: #333; 
            padding: 15px; 
            margin: 15px 0; 
            border-radius: 10px; 
            border: 2px dashed #ff4500; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: 0.3s;
        }
        .shelf:hover { border-color: #ffd700; background: #3a3a3a; }
        .btn { 
            background: #ff4500; 
            border: none; 
            padding: 10px 15px; 
            color: white; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px;
            transition: 0.2s;
        }
        .btn:hover { background: #ff6347; transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        .btn-buy { 
            background: #00e676; 
            color: #000; 
            width: 100%; 
            font-size: 18px; 
            margin-bottom: 20px; 
        }
        .btn-buy:hover { background: #00c853; }
        #coins { color: #ffd700; font-size: 28px; font-weight: 900; text-shadow: 0 0 10px #ffd700; }
    </style>
</head>
<body>

    <h1>🏪 MY SUPERMARKET</h1>
    <div class="game-box">
        <h2>💰 Coins: <span id="coins">50</span></h2>
        
        <button class="btn btn-buy" onclick="buyShelf()">➕ Buy New Shelf (30 Coins)</button>
        
        <div id="shop"></div>
    </div>

    <script>
        let coins = 50;
        let shelves = [];

        // इनबिल्ट साऊंड जनरेटर (कोणत्याही लिंकची गरज नाही!)
        function playSound(type) {
            try {
                let ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = ctx.createOscillator();
                osc.connect(ctx.destination);
                
                if (type === 'buy') { osc.frequency.value = 600; osc.type = 'sine'; }
                if (type === 'restock') { osc.frequency.value = 400; osc.type = 'square'; }
                if (type === 'sell') { osc.frequency.value = 850; osc.type = 'triangle'; }
                
                osc.start();
                setTimeout(() => osc.stop(), 100);
            } catch (e) { 
                console.log("Sound error ignored"); 
            }
        }

        function buyShelf() {
            if (coins >= 30) {
                coins -= 30;
                shelves.push({ stock: 0 }); // नवीन शेल्फ
                playSound('buy');
                updateUI();
            } else {
                alert("⚠️ Not enough coins! You need 30 coins.");
            }
        }

        function restock(index) {
            if (coins >= 10) {
                if (shelves[index].stock >= 5) {
                    alert("⚠️ Shelf is already full!");
                    return;
                }
                coins -= 10;
                shelves[index].stock = 5; // स्टॉक पूर्ण भरला
                playSound('restock');
                updateUI();
            } else {
                alert("⚠️ Not enough coins to restock! You need 10 coins.");
            }
        }

        function updateUI() {
            document.getElementById('coins').innerText = coins;
            let shop = document.getElementById('shop');
            shop.innerHTML = "";
            
            if (shelves.length === 0) {
                shop.innerHTML = "<p style='color:#888; font-weight:bold;'>Your shop is empty.<br>Buy a shelf to start!</p>";
            }

            // प्रत्येक शेल्फ डिझाईन करणे
            shelves.forEach((s, i) => {
                let apples = "🍎".repeat(s.stock);
                let empty = "❌".repeat(5 - s.stock);
                
                shop.innerHTML += `
                    <div class="shelf">
                        <div style="text-align:left;">
                            <strong style="color:#00ced1; font-size:16px;">Shelf ${i + 1}</strong><br>
                            <span style="font-size:22px;">${apples}${empty}</span>
                        </div>
                        <button class="btn" onclick="restock(${i})">Restock (10)</button>
                    </div>`;
            });
        }

        // ऑटोमॅटिक कमाई (ग्राहक खरेदी करतात)
        setInterval(() => {
            let soldSomething = false;
            
            shelves.forEach(s => {
                if (s.stock > 0) {
                    s.stock--; // १ सफरचंद विकले गेले
                    coins += 5; // ५ कॉइन्स मिळाले
                    soldSomething = true;
                }
            });

            if (soldSomething) {
                playSound('sell'); // खरेदीचा आवाज
                updateUI();
            }
        }, 3000); // दर ३ सेकंदाला ग्राहक येतात

        // सुरुवातीला UI लोड करणे
        updateUI();
    </script>
</body>
</html>
