<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermarket Empire Tycoon</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ==========================================================================
           1. CSS STYLING & ANIMATIONS
           ========================================================================== */
        :root {
            --bg-dark: #0f172a; --panel-bg: #1e293b; --text-main: #f8fafc;
            --accent: #3b82f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; user-select: none; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout Grid */
        #game-container { display: flex; width: 100%; height: 100%; }
        #left-panel { width: 250px; background: var(--panel-bg); padding: 20px; border-right: 2px solid #334155; display: flex; flex-direction: column; gap: 15px; }
        #main-area { flex-grow: 1; padding: 20px; position: relative; overflow-y: auto; background: radial-gradient(circle at top, #1e293b, #0f172a); }
        #right-panel { width: 300px; background: var(--panel-bg); padding: 20px; border-left: 2px solid #334155; display: flex; flex-direction: column; }

        /* Typography & UI Elements */
        h1, h2, h3 { text-transform: uppercase; letter-spacing: 1px; }
        .title { font-size: 24px; color: var(--accent); font-weight: 900; text-align: center; margin-bottom: 20px; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .stat-box { background: #0f172a; padding: 15px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 10px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: 900; color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }
        
        /* Buttons */
        .btn { padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:active { transform: translateY(1px); }
        .btn-blue { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .btn-green { background: var(--success); color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        .btn-orange { background: var(--warning); color: #000; }
        .btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; box-shadow: none; transform: none; }

        /* Shelves Grid */
        #store-floor { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .shelf { background: rgba(30, 41, 59, 0.8); border: 2px solid #334155; border-radius: 15px; padding: 15px; text-align: center; position: relative; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .shelf:hover { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }
        .shelf-title { font-size: 16px; font-weight: bold; color: #cbd5e1; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px;}
        .stock-display { font-size: 35px; letter-spacing: 5px; margin: 15px 0; min-height: 50px; display: flex; justify-content: center; align-items: center; flex-wrap: wrap;}
        .progress-bar { width: 100%; height: 8px; background: #334155; border-radius: 5px; overflow: hidden; margin-bottom: 15px; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.3s; }

        /* Assign Product Modal */
        .product-selector { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .prod-btn { background: #334155; border: 1px solid #475569; color: white; padding: 8px; border-radius: 5px; cursor: pointer; text-align: left; }
        .prod-btn:hover { background: #475569; }

        /* Customer Log */
        #log-container { flex-grow: 1; background: #0f172a; border-radius: 10px; border: 1px solid #334155; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .log-entry { background: #1e293b; padding: 8px 12px; border-radius: 6px; border-left: 4px solid var(--success); font-size: 13px; animation: slideIn 0.3s ease-out; }
        
        /* Start Overlay */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .pop-anim { animation: pop 0.3s ease-out; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Start Overlay (To bypass browser audio block) -->
    <div id="start-overlay">
        <h1 style="font-size: 40px; color: var(--accent); margin-bottom: 20px; text-shadow: 0 0 20px var(--accent);">🏪 SUPERMARKET EMPIRE</h1>
        <p style="margin-bottom: 30px; color: #cbd5e1;">Manage stock, hire staff, and become a millionaire!</p>
        <button class="btn btn-green" style="width: 250px; font-size: 18px; padding: 15px; justify-content: center;" onclick="startGame()">▶️ START GAME</button>
    </div>

    <!-- Hidden Audio for Background Music -->
    <audio id="bgMusic" loop>
        <!-- Using a reliable public domain ambient/game loop -->
        <source src="https://vgmsite.com/soundtracks/wii-shop-channel-music/qjrtzpqe/01%20Wii%20Shop%20Channel.mp3" type="audio/mpeg">
    </audio>

    <!-- UI STRUCTURE -->
    <div id="game-container">
        
        <!-- Left Panel: Stats & Upgrades -->
        <div id="left-panel">
            <div class="title">My Store</div>
            
            <div class="stat-box">
                <div style="font-size: 12px; color: #94a3b8;">STORE BALANCE</div>
                <div class="stat-value" id="coin-display">🪙 100</div>
            </div>
            
            <div class="stat-box" style="padding: 10px;">
                <div style="font-size: 12px; color: #94a3b8;">STORE LEVEL</div>
                <div style="font-size: 20px; font-weight: bold; color: var(--accent);" id="level-display">Level 1</div>
            </div>

            <h3 style="font-size: 14px; margin-top: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px;">🏗️ BUILD & UPGRADE</h3>
            <button class="btn btn-blue" id="btn-buy-shelf" onclick="buyShelf()">
                <span>➕ Buy Shelf</span> <span id="shelf-cost">50 🪙</span>
            </button>

            <h3 style="font-size: 14px; margin-top: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px;">👨‍💼 STAFF</h3>
            <button class="btn btn-orange" id="btn-hire-staff" onclick="hireStaff()">
                <span>👷 Hire Manager</span> <span id="staff-cost">300 🪙</span>
            </button>
            <p style="font-size: 11px; color: #94a3b8; text-align: center;">Managers automatically restock empty shelves.</p>

            <div style="margin-top: auto;">
                <button class="btn" style="background:#334155; color:white; justify-content:center;" onclick="toggleBGM()">🎵 Toggle Music</button>
            </div>
        </div>

        <!-- Main Area: The Store Floor -->
        <div id="main-area">
            <h2>🛒 STORE FLOOR</h2>
            <div id="store-floor">
                <!-- Shelves will be injected here via JavaScript -->
            </div>
        </div>

        <!-- Right Panel: Logs & Customers -->
        <div id="right-panel">
            <h3 style="font-size: 14px; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 5px;">🚶 LIVE CUSTOMERS</h3>
            <div id="log-container">
                <div style="color: #64748b; font-size: 12px; text-align: center; margin-top: 20px;">Waiting for customers...</div>
            </div>
        </div>

    </div>

    <!-- ==========================================================================
         JAVASCRIPT GAME ENGINE
         ========================================================================== -->
    <script>
        // --- Game State & Data ---
        let game = {
            coins: 100,
            level: 1,
            shelfCost: 50,
            staffCost: 300,
            hasManager: false,
            bgmPlaying: false
        };

        let shelves = []; // Array to hold shelf objects

        // Product Catalog
        const PRODUCTS = {
            apple:  { id: 'apple',  name: 'Apples',   emoji: '🍎', buyCost: 2,  sellPrice: 5,   maxStock: 5 },
            bread:  { id: 'bread',  name: 'Bread',    emoji: '🍞', buyCost: 5,  sellPrice: 12,  maxStock: 4 },
            milk:   { id: 'milk',   name: 'Milk',     emoji: '🥛', buyCost: 8,  sellPrice: 20,  maxStock: 3 },
            laptop: { id: 'laptop', name: 'Laptops',  emoji: '💻', buyCost: 50, sellPrice: 150, maxStock: 1 }
        };

        // --- Audio System (No external links for SFX, uses AudioContext) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
        }

        function playSFX(type) {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                if (type === 'cash') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                } 
                else if (type === 'buy') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                }
                else if (type === 'error') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                }
            } catch(e) {}
        }

        function toggleBGM() {
            let bgm = document.getElementById('bgMusic');
            bgm.volume = 0.2; // Keep it low so it's pleasant
            if (game.bgmPlaying) { bgm.pause(); game.bgmPlaying = false; } 
            else { bgm.play().catch(e=>{}); game.bgmPlaying = true; }
        }

        // --- Core Game Functions ---
        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            initAudio();
            toggleBGM(); // Start music
            // Give 1 starting shelf for free
            shelves.push({ id: 0, product: 'apple', stock: 5 });
            renderShelves();
            updateUI();
            startGameLoops();
            addLog("Game Started! Customers are arriving.");
        }

        function updateUI() {
            let coinEl = document.getElementById('coin-display');
            coinEl.innerText = `🪙 ${game.coins}`;
            coinEl.classList.remove('pop-anim');
            void coinEl.offsetWidth; // Trigger reflow
            coinEl.classList.add('pop-anim');

            document.getElementById('level-display').innerText = `Level ${game.level}`;
            document.getElementById('shelf-cost').innerText = `${game.shelfCost} 🪙`;
            document.getElementById('btn-buy-shelf').disabled = game.coins < game.shelfCost;
            
            let staffBtn = document.getElementById('btn-hire-staff');
            if (game.hasManager) {
                staffBtn.innerHTML = `<span>👷 Manager Hired</span>`;
                staffBtn.disabled = true;
                staffBtn.classList.replace('btn-orange', 'btn-green');
            } else {
                staffBtn.disabled = game.coins < game.staffCost;
            }

            // Level up logic
            if (game.coins >= 1000 && game.level === 1) { game.level = 2; addLog("⭐ LEVEL UP! Store Level 2 reached!"); }
            if (game.coins >= 5000 && game.level === 2) { game.level = 3; addLog("⭐ LEVEL UP! Store Level 3 reached!"); }
        }

        function addLog(msg) {
            let logCont = document.getElementById('log-container');
            if (logCont.innerHTML.includes("Waiting for customers")) logCont.innerHTML = "";
            let entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = msg;
            logCont.prepend(entry);
            if (logCont.children.length > 20) logCont.removeChild(logCont.lastChild); // Keep log tidy
        }

        // --- Store Management ---
        function buyShelf() {
            if (game.coins >= game.shelfCost) {
                game.coins -= game.shelfCost;
                game.shelfCost = Math.floor(game.shelfCost * 1.5); // Next shelf is more expensive
                shelves.push({ id: shelves.length, product: null, stock: 0 });
                playSFX('buy');
                renderShelves();
                updateUI();
                addLog("🏗️ Built a new shelf!");
            } else { playSFX('error'); }
        }

        function hireStaff() {
            if (game.coins >= game.staffCost && !game.hasManager) {
                game.coins -= game.staffCost;
                game.hasManager = true;
                playSFX('buy');
                updateUI();
                addLog("👷 Hired a Manager! Shelves will auto-restock.");
            } else { playSFX('error'); }
        }

        function assignProduct(shelfIndex, prodId) {
            let p = PRODUCTS[prodId];
            shelves[shelfIndex].product = prodId;
            shelves[shelfIndex].stock = 0; // Starts empty, needs restock
            playSFX('buy');
            renderShelves();
        }

        function restockShelf(shelfIndex) {
            let shelf = shelves[shelfIndex];
            if (!shelf.product) return;
            
            let p = PRODUCTS[shelf.product];
            let missingStock = p.maxStock - shelf.stock;
            let cost = missingStock * p.buyCost;

            if (missingStock === 0) return; // Already full

            if (game.coins >= cost) {
                game.coins -= cost;
                shelf.stock = p.maxStock;
                playSFX('buy');
                renderShelves();
                updateUI();
            } else {
                playSFX('error');
                addLog("❌ Not enough coins to restock " + p.name);
            }
        }

        // --- Rendering ---
        function renderShelves() {
            let floor = document.getElementById('store-floor');
            floor.innerHTML = '';

            shelves.forEach((shelf, index) => {
                let div = document.createElement('div');
                div.className = 'shelf';

                if (!shelf.product) {
                    // Empty shelf needing assignment
                    div.innerHTML = `
                        <div class="shelf-title">Empty Shelf</div>
                        <div style="font-size:12px; margin-bottom:10px; color:#94a3b8;">Select a product to sell:</div>
                        <div class="product-selector">
                            <button class="prod-btn" onclick="assignProduct(${index}, 'apple')">🍎 Apples (Buy: 2, Sell: 5)</button>
                            <button class="prod-btn" onclick="assignProduct(${index}, 'bread')">🍞 Bread (Buy: 5, Sell: 12)</button>
                            <button class="prod-btn" onclick="assignProduct(${index}, 'milk')">🥛 Milk (Buy: 8, Sell: 20)</button>
                            ${game.level >= 2 ? `<button class="prod-btn" onclick="assignProduct(${index}, 'laptop')">💻 Laptop (Buy: 50, Sell: 150)</button>` : '<button class="prod-btn" disabled>💻 Laptop (Unlocks Lv 2)</button>'}
                        </div>
                    `;
                } else {
                    // Active shelf
                    let p = PRODUCTS[shelf.product];
                    let fillPercentage = (shelf.stock / p.maxStock) * 100;
                    
                    let emojis = p.emoji.repeat(shelf.stock);
                    let emptySlots = "❌".repeat(p.maxStock - shelf.stock);

                    div.innerHTML = `
                        <div class="shelf-title">${p.name}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${fillPercentage}%; background: ${fillPercentage > 20 ? 'var(--success)' : 'var(--danger)'}"></div>
                        </div>
                        <div class="stock-display">${emojis}${emptySlots}</div>
                        <button class="btn btn-green" onclick="restockShelf(${index})" ${shelf.stock === p.maxStock ? 'disabled' : ''}>
                            📦 Restock (-${(p.maxStock - shelf.stock) * p.buyCost} 🪙)
                        </button>
                    `;
                }
                floor.appendChild(div);
            });
        }

        // --- Game Loops (Automated Mechanics) ---
        function startGameLoops() {
            
            // 1. Customer Buying Loop (Runs every 2.5 seconds)
            setInterval(() => {
                let soldAny = false;
                
                // Shuffle shelves so customers don't just buy from shelf 1
                let activeShelves = shelves.map((s, i) => ({...s, index: i})).filter(s => s.product && s.stock > 0);
                activeShelves.sort(() => Math.random() - 0.5);

                if (activeShelves.length > 0) {
                    // Randomly pick 1 or 2 shelves to buy from
                    let buys = Math.floor(Math.random() * 2) + 1; 
                    for(let i=0; i<Math.min(buys, activeShelves.length); i++) {
                        let targetShelf = activeShelves[i];
                        let realShelf = shelves[targetShelf.index];
                        let p = PRODUCTS[realShelf.product];
                        
                        realShelf.stock--;
                        game.coins += p.sellPrice;
                        soldAny = true;
                        addLog(`🚶 Customer bought ${p.emoji} ${p.name} (+${p.sellPrice} 🪙)`);
                    }
                }

                if (soldAny) {
                    playSFX('cash');
                    renderShelves();
                    updateUI();
                }
            }, 2500);

            // 2. Manager Restocking Loop (Runs every 4 seconds)
            setInterval(() => {
                if (game.hasManager) {
                    let managerWorked = false;
                    shelves.forEach((shelf, index) => {
                        if (shelf.product && shelf.stock < PRODUCTS[shelf.product].maxStock) {
                            // Only restock if we have enough money
                            let p = PRODUCTS[shelf.product];
                            let missing = p.maxStock - shelf.stock;
                            let cost = missing * p.buyCost;
                            
                            if (game.coins >= cost) {
                                game.coins -= cost;
                                shelf.stock = p.maxStock;
                                managerWorked = true;
                            }
                        }
                    });
                    
                    if(managerWorked) {
                        addLog("👷 Manager auto-restocked empty shelves.");
                        renderShelves();
                        updateUI();
                    }
                }
            }, 4000);
        }

    </script>
</body>
</html>
