<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Tic-Tac-Toe</title>
    <style>
        /* गुगल फॉन्ट */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* डार्क आणि स्टायलिश बॅकग्राऊंड */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        /* स्कोअरबोर्ड डिझाईन */
        .scoreboard {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 30px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .score-x { color: #00ffcc; text-shadow: 0 0 8px #00ffcc; }
        .score-o { color: #ff007f; text-shadow: 0 0 8px #ff007f; }

        .status {
            font-size: 1.5rem;
            margin-bottom: 20px;
            height: 30px;
            font-weight: 600;
            color: #00ffcc;
        }

        /* गेमचा बोर्ड */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .cell {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.1);
        }

        /* X आणि O साठी निऑन इफेक्ट्स */
        .cell.x {
            color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc;
        }

        .cell.o {
            color: #ff007f;
            text-shadow: 0 0 20px #ff007f;
        }

        /* Play Again बटण */
        .reset-btn {
            margin-top: 35px;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(45deg, #ff007f, #ff5e00);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(255, 0, 127, 0.4);
            letter-spacing: 1px;
        }

        .reset-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.6);
        }
    </style>
</head>
<body>

    <h1>Tic-Tac-Toe</h1>
    
    <div class="scoreboard">
        <div>Player X: <span id="score-x" class="score-x">0</span></div>
        <div>Player O: <span id="score-o" class="score-o">0</span></div>
    </div>

    <div class="status">X's Turn</div>

    <div class="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button class="reset-btn">Play Again</button>

    <script>
        // JavaScript लॉजिक
        const cells = document.querySelectorAll('.cell');
        const statusText = document.querySelector('.status');
        const resetBtn = document.querySelector('.reset-btn');
        const scoreXText = document.getElementById('score-x');
        const scoreOText = document.getElementById('score-o');

        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let running = false;
        let scoreX = 0;
        let scoreO = 0;

        // जिंकण्याच्या अटी (Winning Patterns)
        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // आडवे
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // उभे
            [0, 4, 8], [2, 4, 6]             // तिरपे
        ];

        initializeGame();

        function initializeGame() {
            cells.forEach(cell => cell.addEventListener('click', cellClicked));
            resetBtn.addEventListener('click', restartGame);
            statusText.textContent = `${currentPlayer}'s Turn`;
            running = true;
        }

        function cellClicked() {
            const cellIndex = this.getAttribute('data-index');

            if (board[cellIndex] !== "" || !running) {
                return;
            }

            updateCell(this, cellIndex);
            checkWinner();
        }

        function updateCell(cell, index) {
            board[index] = currentPlayer;
            cell.textContent = currentPlayer;
            
            // स्टाईल अप्लाय करण्यासाठी Class जोडणे
            cell.classList.add(currentPlayer.toLowerCase());
            
            // क्लिक केल्यावर लहानसा बाऊन्स इफेक्ट
            cell.style.transform = "scale(0.8)";
            setTimeout(() => {
                cell.style.transform = "scale(1)";
            }, 100);
        }

        function changePlayer() {
            currentPlayer = (currentPlayer === "X") ? "O" : "X";
            statusText.textContent = `${currentPlayer}'s Turn`;
            
            // खेळाडूप्रमाणे स्टेटसचा रंग बदलणे
            if(currentPlayer === "X"){
                statusText.style.color = "#00ffcc";
            } else {
                statusText.style.color = "#ff007f";
            }
        }

        function checkWinner() {
            let roundWon = false;

            for (let i = 0; i < winConditions.length; i++) {
                const condition = winConditions[i];
                const cellA = board[condition[0]];
                const cellB = board[condition[1]];
                const cellC = board[condition[2]];

                if (cellA === "" || cellB === "" || cellC === "") {
                    continue;
                }
                if (cellA === cellB && cellB === cellC) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusText.textContent = `${currentPlayer} Wins! 🎉`;
                statusText.style.color = "white";
                updateScore();
                running = false;
            } else if (!board.includes("")) {
                statusText.textContent = "Draw! 🤝";
                statusText.style.color = "white";
                running = false;
            } else {
                changePlayer();
            }
        }

        function updateScore() {
            if(currentPlayer === "X") {
                scoreX++;
                scoreXText.textContent = scoreX;
            } else {
                scoreO++;
                scoreOText.textContent = scoreO;
            }
        }

        function restartGame() {
            currentPlayer = "X";
            board = ["", "", "", "", "", "", "", "", ""];
            statusText.textContent = `${currentPlayer}'s Turn`;
            statusText.style.color = "#00ffcc";
            
            // बोर्ड साफ करणे
            cells.forEach(cell => {
                cell.textContent = "";
                cell.classList.remove('x', 'o');
            });
            running = true;
        }
    </script>
</body>
</html>
